<div class="p-3 border rounded bg-white shadow-sm cursor-move" draggable="true">
    <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-3">
            <span class="dot" [ngClass]="getProximityColor(due)" title="Proximidade"></span>
            <div>
                <div class="font-semibold text-slate-800">{{title}}</div>
                <div class="text-xs text-slate-500">Término: {{due}} • {{level}}</div>
            </div>
        </div>
        <div class="text-right">
            <button class="text-xs text-slate-500 mr-2 btn-edit" (click)="editTask()">Editar</button>
            <button class="text-xs text-red-500 btn-del" (click)="this.deleteTask()">Excluir</button>
        </div>
    </div>
    <p class="mt-2 text-sm text-slate-600">{{desc}}</p>
</div>
